<!DOCTYPE html>
<html>
<head>
  <title>Market Overview 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; padding:20px;}
    h1 { color: gold; }
    .box { background:#1e293b; padding:20px; margin:15px; border-radius:10px;}
    button { padding:15px; background:gold; border:none; border-radius:10px; font-size:16px;}
    input { padding:10px; margin:5px; border-radius:5px; border:none; width:80%;}
    .buy { color:#22c55e;}
    .sell { color:#ef4444;}
    .hold { color:#facc15;}
  </style>

  <script>
    var history = [];
    var prevScore = 0;

    function runAI(){

      var gold = 2000 + (Math.random()-0.5)*50;
      var btc  = 40000 + (Math.random()-0.5)*500;
      var eth  = 2000 + (Math.random()-0.5)*50;
      var debt = 3 + (Math.random()-0.5)*0.05;

      var geo  = parseFloat(document.getElementById("geo").value) || 5;
      var disp = parseFloat(document.getElementById("disp").value) || 5;

      function norm(v,min,max){ return (v-min)/(max-min); }

      var score =
        0.4*norm(gold,1500,2500) +
        0.2*norm(btc,20000,80000) +
        0.2*norm(eth,1000,5000) +
        0.1*(geo/10) +
        0.1*(disp/10);

      history.push(score);
      if(history.length>20) history.shift();

      var confidence = 50;
      if(history.length>2){
        var avg = history.reduce((a,b)=>a+b)/history.length;
        var v = history.reduce((a,b)=>a+(b-avg)*(b-avg),0)/history.length;
        confidence = Math.max(10,100-v*200).toFixed(1);
      }

      var trend = "FLAT";
      if(history.length>1){
        var a = history[history.length-1];
        var b = history[history.length-2];
        if(a>b) trend="UP 📈";
        else if(a<b) trend="DOWN 📉";
      }

      var timing = "🟡 WAIT";
      var m = score - prevScore;
      if(score>0.65 && m>0 && confidence>60) timing="🟢 ENTER BUY";
      if(score<0.4 && m<0) timing="🔴 EXIT SELL";

      prevScore = score;

      var decision = "HOLD";
      if(score>0.7) decision="BUY";
      else if(score<0.4) decision="SELL";

      function set(id,val){
        var el = document.getElementById(id);
        if(el) el.innerText = val;
      }

      set("gold", gold.toFixed(2));
      set("btc", btc.toFixed(0));
      set("eth", eth.toFixed(0));
      set("debt", debt.toFixed(2));

      set("score", score.toFixed(3));
      set("conf", confidence+"%");
      set("trend", trend);
      set("timing", timing);

      var d = document.getElementById("decision");
      if(d){
        d.innerText = decision;
        d.className = decision=="BUY"?"buy":decision=="SELL"?"sell":"hold";
      }
    }
  </script>

</head>

<body>

<h1>📈 Market Overview 3</h1>

<div class="box">
  <input id="geo" placeholder="Geo Risk (0-10)">
  <input id="disp" placeholder="Displacement (0-10)">
</div>

<button onclick="runAI()">Run AI</button>

<div class="box">
  <h3>Market</h3>
  <p>Gold: <span id="gold">--</span></p>
  <p>BTC: <span id="btc">--</span></p>
  <p>ETH: <span id="eth">--</span></p>
  <p>Debt: <span id="debt">--</span></p>
</div>

<div class="box">
  <h3>AI Output</h3>
  <p>Score: <span id="score">--</span></p>
  <p>Confidence: <span id="conf">--</span></p>
  <p>Trend: <span id="trend">--</span></p>
  <p>Timing: <span id="timing">--</span></p>
  <h2 id="decision">--</h2>
</div>

</body>
</html>
